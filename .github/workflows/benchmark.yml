name: Benchmark

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install meson ninja

      - name: Configure Project
        run: meson setup builddir/ -Dbenchmarks=true -Dc_std=gnu99
        env:
          CC: gcc

      - name: Build
        run: meson compile -C builddir/

      - name: Run benchmarks
        run: |
          # Run synthetic benchmarks
          ./builddir/json_bench > synthetic.json

          # Run file-based benchmarks
          ./builddir/json_bench bench/canada.json 20 > canada.json
          ./builddir/json_bench bench/500_keys.json 20 > keys500.json

          # Merge all results into one JSON array
          python3 -c "
          import json, sys
          results = []
          for f in sys.argv[1:]:
              with open(f) as fh:
                  results.extend(json.load(fh))
          json.dump(results, open('benchmark_results.json', 'w'), indent=2)
          " synthetic.json canada.json keys500.json

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: benchmark_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-on-alert: true
          alert-threshold: "150%"
          summary-always: true
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          fail-on-alert: true
